<meta charset="utf-8">
<title>attest dashboard</title>
<style>
:root {
  --bg-primary: #ffffff;
  --bg-secondary: #f7f6f1;
  --bg-tertiary: #f1efe8;
  --text-primary: #1c1c1a;
  --text-secondary: #5f5e5a;
  --text-tertiary: #888780;
  --border: rgba(28, 28, 26, 0.12);
  --border-strong: rgba(28, 28, 26, 0.24);
  --accent: #534ab7;
  --accent-bg: #eeedfe;
  --accent-text: #26215c;
  --success: #0f6e56;
  --success-bg: #e1f5ee;
  --warning: #854f0b;
  --warning-bg: #faeeda;
  --danger: #a32d2d;
  --danger-bg: #fcebeb;
  --info: #185fa5;
  --info-bg: #e6f1fb;
  --neutral: #5f5e5a;
  --neutral-bg: #f1efe8;
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: "SF Mono", Menlo, Consolas, monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-primary: #1a1a18;
    --bg-secondary: #232321;
    --bg-tertiary: #2c2c2a;
    --text-primary: #f1efe8;
    --text-secondary: #b4b2a9;
    --text-tertiary: #888780;
    --border: rgba(241, 239, 232, 0.12);
    --border-strong: rgba(241, 239, 232, 0.24);
    --accent: #afa9ec;
    --accent-bg: #26215c;
    --accent-text: #cecbf6;
    --success: #5dcaa5;
    --success-bg: #04342c;
    --warning: #fac775;
    --warning-bg: #412402;
    --danger: #f09595;
    --danger-bg: #501313;
    --info: #85b7eb;
    --info-bg: #042c53;
    --neutral: #b4b2a9;
    --neutral-bg: #2c2c2a;
  }
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  background: var(--bg-tertiary);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}
.app { max-width: 1400px; margin: 0 auto; padding: 24px; }
.header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 16px;
  border-bottom: 0.5px solid var(--border);
  margin-bottom: 24px;
}
.header h1 {
  font-size: 18px;
  font-weight: 500;
  margin: 0;
  letter-spacing: -0.01em;
}
.header .repo {
  color: var(--text-secondary);
  font-family: var(--font-mono);
  font-size: 13px;
  margin-left: 12px;
}
.header .controls {
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 13px;
  color: var(--text-secondary);
}
.btn {
  background: transparent;
  border: 0.5px solid var(--border-strong);
  border-radius: 8px;
  padding: 6px 12px;
  font: inherit;
  font-size: 13px;
  color: var(--text-primary);
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: var(--bg-secondary); }
.btn:active { transform: scale(0.98); }
.btn.subtle { color: var(--text-secondary); border-color: var(--border); }

.metrics-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.metric {
  background: var(--bg-primary);
  border: 0.5px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
}
.metric .label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: none;
  letter-spacing: 0;
}
.metric .value {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.metric .sub {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 4px;
}
.metric.placeholder .value {

  font-size: 16px;
  font-weight: 400;
}

.signals {

  border: 0.5px solid var(--border);
  border-radius: 8px;
  padding: 16px 20px;
  margin-bottom: 24px;
}
.signals h2 {
  margin: 0 0 12px 0;
  font-size: 13px;
  font-weight: 500;

  display: flex;
  align-items: center;
  gap: 8px;
}
.signals .count {

  color: var(--text-secondary);

  padding: 2px 8px;
  border-radius: 10px;

}
.signal {

  gap: 12px;
  padding: 10px 0;
  border-top: 0.5px solid var(--border);

}
.signal:first-of-type { border-top: none; padding-top: 0; }
.signal .dot {

.signal .body { flex: 1; }

.layout {

}
.layout.detail {

.intents-list {

}
.intents-toolbar {

.status-badge {

}
.status-draft { background: var(--neutral-bg); color: var(--neutral); }
.status-signed-off, .status-contract-locked, .status-in-progress, .status-ready-for-review { background: var(--info-bg); color: var(--info); }
.status-done, .status-closed-resolved { background: var(--success-bg); color: var(--success); }

      <h1>attest dashboard <span class="repo" id="repo-name"></span></h1>
    </div>

<script>
// ============================================================================
// Data layer — JSONL parsing + in-memory model
// ============================================================================

const state = {
  events: [],
  intents: [],            // sorted business intents (specs/fixes/investigations)
  decisions: new Map(),   // decision_id → {logged, reviewed}
  artifacts: new Map(),   // path → artifact metadata
  sessions: new Map(),    // session_id → session data
  view: 'list',           // 'list' | 'detail' | 'artifact'
  selectedIntent: null,
  selectedArtifact: null,
  filter: 'all',
};

function parseJsonl(text) {
  const events = [];
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    try { events.push(JSON.parse(line)); }
    catch (e) { /* skip malformed lines silently */ }
  }
  return events.sort((a, b) => (a.ts || '').localeCompare(b.ts || ''));
}

function ingest(events) {
  state.events = events;
  state.artifacts.clear();
  state.decisions.clear();
  state.sessions.clear();

  for (const e of events) {
    const sid = e.session_id;
    if (e.event_type === 'session_start') {
      state.sessions.set(sid, {
        session_id: sid,
        command: e.command,
        model: e.model,
        recommended_model: e.recommended_model,
        scope: e.scope,
        parent_session_id: e.parent_session_id,
        started_at: e.ts,
        outcome: 'in-progress',
        ended_at: null,
        events: [],
      });
    }
    if (sid && state.sessions.has(sid)) {
      state.sessions.get(sid).events.push(e);
    }
    if (e.event_type === 'session_end') {
      const s = state.sessions.get(sid);
      if (s) { s.outcome = e.outcome; s.ended_at = e.ts; }
    }
    if (e.event_type === 'artifact_created') {
      state.artifacts.set(e.artifact, {
        path: e.artifact,
        kind: e.kind,
        ticket_id: e.ticket_id,
        title: e.title,
        status: e.status || 'draft',
        first_seen: e.ts,
        last_updated: e.ts,
        parent_artifact: e.parent_artifact,
        from_investigation: e.from_investigation,
        case: e.case,
        sessions: new Set([sid]),
      });
    }
    if (e.event_type === 'artifact_updated') {
      const a = state.artifacts.get(e.artifact);
      if (a) {
        if (e.status) a.status = e.status;
        a.last_updated = e.ts;
        a.sessions.add(sid);
      }
    }
    if (e.event_type === 'decision_logged') {
      state.decisions.set(e.decision_id || e.event_id, {
        decision_id: e.decision_id || e.event_id,
        session_id: sid,
        artifact: e.artifact,
        summary: e.summary,
        rationale: e.rationale,
        accepted: e.accepted,
        ts: e.ts,
        verdict: null,
        reviewer_note: null,
        reviewed_at: null,
      });
    }
    if (e.event_type === 'decision_reviewed') {
      const d = state.decisions.get(e.decision_id);
      if (d) {
        d.verdict = e.verdict;
        d.reviewer_note = e.reviewer_note;
        d.reviewed_at = e.ts;
      }
    }
  }

  // Build intents: any spec/fix/investigation is a top-level intent
  state.intents = Array.from(state.artifacts.values())
    .filter(a => ['spec', 'fix', 'investigation'].includes(a.kind))
    .sort((a, b) => (b.first_seen || '').localeCompare(a.first_seen || ''));
}

// ============================================================================
// Intent enrichment — pull together all related data for one intent
// ============================================================================

function buildIntentDetail(intent) {
  // Collect every event that names this artifact
  const directEvents = state.events.filter(e =>
    e.artifact === intent.path ||
    e.parent_artifact === intent.path ||
    e.from_investigation === intent.path
  );

  // Collect related sessions (any session that touched this artifact)
  const relatedSessionIds = new Set();
  for (const e of directEvents) {
    if (e.session_id) relatedSessionIds.add(e.session_id);
  }
  // Pull in subagent children of those sessions
  for (const sid of Array.from(relatedSessionIds)) {
    const session = state.sessions.get(sid);
    if (!session) continue;
    for (const e of session.events) {
      if (e.event_type === 'subagent_spawned' && e.child_session_id) {
        relatedSessionIds.add(e.child_session_id);
      }
    }
  }

  const sessions = Array.from(relatedSessionIds)
    .map(sid => state.sessions.get(sid))
    .filter(Boolean)
    .sort((a, b) => (a.started_at || '').localeCompare(b.started_at || ''));

  // All events from related sessions, plus direct events
  const allEvents = new Set(directEvents);
  for (const s of sessions) {
    for (const e of s.events) allEvents.add(e);
  }
  const events = Array.from(allEvents).sort((a, b) =>
    (a.ts || '').localeCompare(b.ts || '')
  );

  // Decisions for this intent
  const decisions = Array.from(state.decisions.values())
    .filter(d => d.artifact === intent.path)
    .sort((a, b) => (a.ts || '').localeCompare(b.ts || ''));

  // Coverage measurements
  const coverage = events.filter(e => e.event_type === 'coverage_measured');

  // Drift findings
  const drift = events.filter(e => e.event_type === 'drift_detected');

  // Lessons
  const lessons = events.filter(e => e.event_type === 'lesson_encoded');

  // Generated artifacts (e.g., _generated/openapi/...)
  const generated = Array.from(state.artifacts.values())
    .filter(a => a.parent_artifact === intent.path);

  // Superseding spec if this got superseded
  const supersedingSpec = Array.from(state.artifacts.values())
    .find(a => a.kind === 'spec' && a.from_investigation && intent.kind === 'investigation');

  // Build the workflow stages — depends on kind
  const stages = buildStages(intent, events, sessions, generated, decisions);

  return { intent, events, sessions, decisions, coverage, drift, lessons, generated, stages };
}

function buildStages(intent, events, sessions, generated, decisions) {
  const stages = [];

  // Stage 1: ticket
  stages.push({
    stage: 'ticket',
    label: intent.ticket_id || '?',
    substat: 'business intent',
    complete: true,
    artifact: null,
  });

  // Stage 2: the primary artifact (spec/fix/investigation)
  stages.push({
    stage: intent.kind,
    label: filename(intent.path),
    substat: 'status: ' + (intent.status || 'unknown'),
    complete: ['done', 'closed-resolved', 'superseded', 'ready-for-review'].includes(intent.status),
    active: ['in-progress', 'draft', 'signed-off', 'contract-locked', 'open', 'root-cause-identified'].includes(intent.status),
    artifact: intent.path,
  });

  // Stage 3: generated artifacts (if any)
  if (generated.length > 0) {
    stages.push({
      stage: 'contract',
      label: '_generated/',
      substat: generated.length + ' artifact' + (generated.length !== 1 ? 's' : ''),
      complete: true,
      artifact: generated[0].path,
    });
  }

  // Stage 4: work sessions
  const workSessions = sessions.filter(s => s.command === 'work');
  if (workSessions.length > 0) {
    const scopes = workSessions.map(s => s.scope).filter(Boolean);
    stages.push({
      stage: 'work',
      label: workSessions.length === 1 ? '/work' : '/work ×' + workSessions.length,
      substat: scopes.length ? scopes.join(' + ') : 'execution',
      complete: workSessions.every(s => s.outcome === 'completed'),
      active: workSessions.some(s => s.outcome === 'in-progress'),
      artifact: null,
    });
  }

  // Stage 5: decision review
  const reviewedDecisions = decisions.filter(d => d.verdict);
  if (decisions.length > 0) {
    stages.push({
      stage: 'review',
      label: '/review-decisions',
      substat: reviewedDecisions.length + ' / ' + decisions.length + ' reviewed',
      complete: reviewedDecisions.length === decisions.length && decisions.length > 0,
      active: reviewedDecisions.length < decisions.length,
      artifact: null,
    });
  }

  // Stage 6: commits (approximated by gate_passed events)
  const commits = events.filter(e => e.event_type === 'gate_passed' && e.source === 'pre-commit');
  if (commits.length > 0) {
    stages.push({
      stage: 'commits',
      label: 'commits ×' + commits.length,
      substat: 'wall checks passed',
      complete: true,
      artifact: null,
    });
  }

  return stages;
}

function filename(path) {
  if (!path) return '';
  return path.split('/').pop();
}

// ============================================================================
// Friction signals — observations + suggested actions
// ============================================================================

function computeSignals() {
  const signals = [];
  const now = new Date();

  // 1. Specs sitting in draft >7 days
  const stuckDrafts = state.intents.filter(i =>
    i.kind === 'spec' && i.status === 'draft' &&
    (now - new Date(i.first_seen)) > 7 * 24 * 60 * 60 * 1000
  );
  if (stuckDrafts.length > 0) {
    signals.push({
      severity: 'warn',
      observation: stuckDrafts.length + ' spec' + (stuckDrafts.length !== 1 ? 's' : '') + ' in draft for >7 days: ' +
        stuckDrafts.slice(0, 3).map(s => s.ticket_id || filename(s.path)).join(', ') +
        (stuckDrafts.length > 3 ? ' and ' + (stuckDrafts.length - 3) + ' more' : ''),
      action: 'Either run /work to start execution, or close the spec if no longer needed.',
    });
  }

  // 2. High decision volume per spec
  const decisionsBySpec = new Map();
  for (const d of state.decisions.values()) {
    if (!d.artifact) continue;
    decisionsBySpec.set(d.artifact, (decisionsBySpec.get(d.artifact) || 0) + 1);
  }
  const highDecisionSpecs = Array.from(decisionsBySpec.entries()).filter(([_, n]) => n >= 5);
  if (highDecisionSpecs.length > 0) {
    signals.push({
      severity: 'info',
      observation: highDecisionSpecs.length + ' spec' + (highDecisionSpecs.length !== 1 ? 's' : '') +
        ' had 5+ decisions logged during /work — suggests under-specified Contract Surface.',
      action: 'Consider tightening the Contract Surface in future specs or reviewing whether the rationale patterns suggest a CLAUDE.md invariant.',
    });
  }

  // 3. Coverage failures with bypasses
  const covFailures = state.events.filter(e => e.event_type === 'coverage_measured' && e.passed === false);
  const bypasses = state.events.filter(e => e.event_type === 'gate_bypassed');
  if (covFailures.length > 0 && bypasses.length > 0) {
    signals.push({
      severity: bypasses.length >= 3 ? 'critical' : 'warn',
      observation: covFailures.length + ' coverage failure' + (covFailures.length !== 1 ? 's' : '') +
        ' and ' + bypasses.length + ' pre-commit bypass' + (bypasses.length !== 1 ? 'es' : '') + '.',
      action: 'Review whether bypasses align with the policy in CLAUDE.md. Repeated bypasses may indicate a threshold mismatch.',
    });
  }

  // 4. Investigations that closed but never chained to a lesson
  const closedInvs = state.intents.filter(i => i.kind === 'investigation' && i.status === 'closed-resolved');
  const lessonsEncoded = state.events.filter(e => e.event_type === 'lesson_encoded').length;
  if (closedInvs.length > 0 && lessonsEncoded < closedInvs.length * 0.3) {
    signals.push({
      severity: 'warn',
      observation: closedInvs.length + ' resolved investigation' + (closedInvs.length !== 1 ? 's' : '') +
        ' but only ' + lessonsEncoded + ' lesson' + (lessonsEncoded !== 1 ? 's' : '') + ' encoded — learning loop closure rate is low.',
      action: 'For each closed-resolved investigation, run /encode-lesson after the fix holds for one usage cycle.',
    });
  }

  // 5. Recommended-model divergence
  const divergent = Array.from(state.sessions.values()).filter(s =>
    s.model && s.recommended_model && s.model !== s.recommended_model
  );
  if (divergent.length >= 3) {
    signals.push({
      severity: 'info',
      observation: divergent.length + ' session' + (divergent.length !== 1 ? 's' : '') +
        ' used a different model than recommended.',
      action: 'Review whether the deviations were intentional. Frequent divergence may indicate the recommendation needs updating in CLAUDE.md.',
    });
  }

  // 6. Decisions never reviewed
  const pendingReview = Array.from(state.decisions.values()).filter(d => !d.verdict);
  if (pendingReview.length >= 5) {
    signals.push({
      severity: 'warn',
      observation: pendingReview.length + ' logged decisions awaiting human review.',
      action: 'Run /review-decisions on the specs with the most pending decisions before merging.',
    });
  }

  return signals;
}

// ============================================================================
// Metrics
// ============================================================================

function computeMetrics() {
  const intents = state.intents;
  const sessions = Array.from(state.sessions.values());

  const totalIntents = intents.length;
  const active = intents.filter(i => ['in-progress', 'open', 'root-cause-identified', 'signed-off', 'contract-locked', 'ready-for-review'].includes(i.status)).length;
  const done = intents.filter(i => ['done', 'closed-resolved', 'superseded'].includes(i.status)).length;
  const blocked = intents.filter(i => ['stalled'].includes(i.status)).length;
  const drafts = intents.filter(i => i.status === 'draft').length;

  // Wall time per workflow — sum session durations
  let totalSecs = 0;
  for (const s of sessions) {
    if (s.started_at && s.ended_at) {
      totalSecs += (new Date(s.ended_at) - new Date(s.started_at)) / 1000;
    }
  }

  const bypasses = state.events.filter(e => e.event_type === 'gate_bypassed').length;
  const covFailures = state.events.filter(e => e.event_type === 'coverage_measured' && e.passed === false).length;

  return {
    totalIntents, active, done, blocked, drafts,
    totalSessions: sessions.length,
    totalSecs,
    bypasses,
    covFailures,
  };
}

function formatDuration(secs) {
  if (secs < 60) return Math.round(secs) + 's';
  if (secs < 3600) return Math.round(secs / 60) + 'm';
  if (secs < 86400) return Math.round(secs / 3600 * 10) / 10 + 'h';
  return Math.round(secs / 86400 * 10) / 10 + 'd';
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}

  render();

  state.view = 'list';

function bindTabs() {
  document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');

      const d = buildIntentDetail(intent);
      const c = document.getElementById('tab-content');
      const tab = t.dataset.tab;
      if (tab === 'decisions') c.innerHTML = renderDecisionsTab(d.decisions);
      else if (tab === 'coverage') c.innerHTML = renderCoverageTab(d.coverage);
      else if (tab === 'drift') c.innerHTML = renderDriftTab(d.drift);
      else if (tab === 'lessons') c.innerHTML = renderLessonsTab(d.lessons);
      else if (tab === 'claude') c.innerHTML = renderClaudeTab();
    };
  });
}

// ============================================================================
// Loading
// ============================================================================

function loadFromText(text, sourceLabel) {
  const events = parseJsonl(text);
  ingest(events);
  document.getElementById('data-status').textContent = events.length + ' events · ' + sourceLabel;
  render();
}

function loadFromFile(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = e => loadFromText(e.target.result, file.name);
  r.readAsText(file);
}

async function tryAutoLoad() {
  const candidates = [
    '../ledger/events.jsonl',
    '.attest/ledger/events.jsonl',
    './events.jsonl',
  ];
  for (const p of candidates) {
    try {
      const r = await fetch(p);
      if (r.ok) {
        const t = await r.text();
        if (t.trim()) {
          loadFromText(t, p);
          return true;
        }
      }
    } catch (e) { /* probably file:// — fetch may fail */ }
  }
  return false;
}

async function reload() {
  if (await tryAutoLoad()) return;
  document.getElementById('data-status').textContent = 'no auto-load source; use file picker';
}

// Auto-load on first paint
(async () => {
  const root = window.location.pathname.split('/').slice(-3, -1).join('/') || 'unknown';
  document.getElementById('repo-name').textContent = '· ' + root;
  if (!(await tryAutoLoad())) {
    render(); // shows empty state
  }
})();
</script>
